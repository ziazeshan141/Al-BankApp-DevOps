name: Build - Container Build & Push

on:
  workflow_call:

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:

  # ============================================================
  # GATE 5: BUILD
  # ============================================================
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # ============================================================
  # GATE 6: CONTAINER IMAGE SCAN - Trivy
  # ============================================================
  image_scan:
    name: Container Scan - Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image (for scanning)
        run: docker build --pull -t bankapp:scan-${{ github.sha }} .

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bankapp:scan-${{ github.sha }}
          format: 'table'
          exit-code: '1'         # Enforce: fail pipeline on CRITICAL/HIGH findings
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: trivy-report.txt
          trivy-config: trivy.yaml

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-report
          path: trivy-report.txt

  # ============================================================
  # GATE 7: PUSH TO ECR
  # ============================================================
  push_to_ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: image_scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug GitHub Context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"

      - name: Debug secret length (safe, no value exposed)
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          echo "Length: ${#ROLE_ARN}"
          echo "Starts with: ${AWS_ROLE_ARN:0:8}"
          echo "Ends with: ${AWS_ROLE_ARN: -20}" 
      - name: Decode actual OIDC token claims
        run: |
          IDTOKEN=$(curl -sSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo "$IDTOKEN" | cut -d'.' -f2 | base64 -d 2>/dev/null | jq '{sub, aud, repository, ref}' || \
          echo "$IDTOKEN" | cut -d'.' -f2 | base64 --decode 2>/dev/null
    
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-skip-session-tagging: true  # Optional: Skip session tagging if not needed

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --pull -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
